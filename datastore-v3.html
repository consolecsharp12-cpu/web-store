<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>DataStore</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow:hidden}
body{height:100%;overflow:hidden;width:100%;overscroll-behavior:none;background:#0f0f0f;font-family:'Inter',-apple-system,sans-serif;font-size:13px;color:#e0e0e0}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a3a3a}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 #0078d420}50%{box-shadow:0 0 16px 4px #0078d420}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.root{display:flex;flex-direction:column;height:calc(var(--vh,1vh)*100);overflow:hidden;overscroll-behavior:none;position:fixed;top:0;left:0;right:0;bottom:0}
.titlebar{height:28px;background:#111;display:flex;align-items:center;padding:0 14px;user-select:none;flex-shrink:0;border-bottom:1px solid #2a2a2a}
.main{display:flex;flex:1;overflow:hidden;overscroll-behavior:none}
.activity{width:44px;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:2px;flex-shrink:0;border-right:1px solid #2a2a2a}
.sidebar{width:230px;background:#141414;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;-webkit-overflow-scrolling:touch}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabbar{height:36px;background:#161616;display:flex;align-items:stretch;border-bottom:1px solid #2a2a2a;flex-shrink:0;overflow-x:auto;overflow-y:hidden}
.tabbar::-webkit-scrollbar{height:2px}
.editor{flex:1;overflow-y:auto;background:#0f0f0f;padding:28px 32px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.statusbar{height:22px;background:#0066b8;display:flex;align-items:center;padding:0 12px;gap:16px;flex-shrink:0}
.act-icon{width:44px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#444;font-size:15px;transition:all .15s;border-left:2px solid transparent;font-family:'JetBrains Mono',monospace}
.act-icon:hover{color:#777;background:#222}
.act-icon.active{color:#e0e0e0;border-left-color:#0078d4;background:#1a1a1a}
.sidebar-header{padding:12px 12px 6px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#444;text-transform:uppercase;user-select:none}
.sidebar-section-title{padding:5px 12px;font-size:11px;font-weight:600;color:#777;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;transition:color .1s}
.sidebar-section-title:hover{color:#e0e0e0}
.file-item{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 22px;cursor:pointer;color:#777;font-size:12px;transition:all .1s;white-space:nowrap;overflow:hidden;border-left:2px solid transparent}
.file-item:hover{background:#222;color:#e0e0e0}
.file-item.active{background:#0078d415;color:#e0e0e0;border-left-color:#0078d4}
.tab{display:flex;align-items:center;gap:6px;padding:0 14px;border-right:1px solid #2a2a2a;cursor:pointer;font-size:12px;color:#666;white-space:nowrap;transition:all .1s;min-width:110px;max-width:180px;position:relative;flex-shrink:0}
.tab:hover{background:#222;color:#e0e0e0}
.tab.active{background:#0f0f0f;color:#e0e0e0;border-top:1px solid #0078d4}
.tab-close{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:2px;color:#555;font-size:13px;transition:all .1s;margin-left:auto;flex-shrink:0}
.tab-close:hover{background:#3a3a3a;color:#e0e0e0}
.breadcrumb{padding:5px 32px;background:#141414;border-bottom:1px solid #2a2a2a;font-size:11px;color:#777;display:flex;align-items:center;gap:5px;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.file-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:0;transition:all .18s;cursor:default;overflow:hidden;display:flex;flex-direction:column;animation:fadeIn .2s ease both}
.file-card:hover{border-color:#0078d455;box-shadow:0 4px 20px #00000040;transform:translateY(-1px)}
.file-card-accent{height:2px;width:100%}
.file-card-body{padding:14px 16px;flex:1;display:flex;flex-direction:column}
.file-card-icon{font-size:18px;font-family:'JetBrains Mono',monospace;margin-bottom:10px}
.file-card-name{font-weight:600;font-size:13px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e0e0e0}
.file-card-desc{color:#777;font-size:11px;margin-bottom:10px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;flex:1;line-height:1.5}
.file-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:10px;border-top:1px solid #2a2a2a}
.type-badge{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.8px;font-family:'JetBrains Mono',monospace}
.vsc-input{background:#252525;border:1px solid #333;color:#e0e0e0;border-radius:4px;padding:7px 10px;font-size:12px;outline:none;width:100%;font-family:inherit;transition:border-color .15s}
.vsc-input:focus{border-color:#0078d4;box-shadow:0 0 0 2px #0078d420}
.vsc-input::placeholder{color:#444}
.btn-primary{background:#0078d4;color:#fff;border:none;border-radius:4px;padding:7px 16px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:#1a8fe6}
.btn-secondary{background:transparent;color:#e0e0e0;border:1px solid #3a3a3a;border-radius:4px;padding:7px 14px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:#222;border-color:#4a4a4a}
.btn-icon-sm{background:transparent;border:none;color:#777;cursor:pointer;padding:4px 7px;border-radius:4px;font-size:12px;transition:all .12s}
.btn-icon-sm:hover{background:#222;color:#e0e0e0}
.btn-icon-sm.danger:hover{background:#1a0a0a;color:#e05252}
.upload-zone{border:1.5px dashed #333;border-radius:8px;padding:44px 24px;text-align:center;cursor:pointer;transition:all .25s;background:#141414;position:relative;overflow:hidden}
.upload-zone:hover,.upload-zone.drag{border-color:#0078d4;background:#1a1a1a;box-shadow:0 0 30px #0078d420}
.upload-zone.drag{animation:glow 1s infinite}
.upload-icon{font-size:36px;margin-bottom:12px;color:#777;transition:all .2s;font-family:'JetBrains Mono',monospace}
.upload-zone:hover .upload-icon{color:#0078d4;transform:translateY(-3px)}
.prog-track{background:#1e1e1e;border-radius:3px;height:4px;overflow:hidden;margin-top:10px}
.prog-fill{height:4px;background:linear-gradient(90deg,#0078d4,#00c4ff);border-radius:3px;transition:width .3s ease}
.file-detail{margin-bottom:24px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden;animation:fadeIn .2s ease}
.notif{position:fixed;bottom:28px;right:20px;z-index:9999;background:#1a1a1a;border:1px solid #2a2a2a;border-left:3px solid #0078d4;color:#e0e0e0;padding:11px 18px;font-size:12px;border-radius:6px;box-shadow:0 8px 30px #00000060;animation:fadeUp .2s ease;min-width:240px;display:flex;align-items:center;gap:10px}
.notif.err{border-left-color:#e05252}
.notif.warn{border-left-color:#d4a017}
.notif.ok{border-left-color:#3dc9a0}
.pw-screen{max-width:340px;margin:80px auto;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:32px;animation:fadeIn .2s ease;box-shadow:0 20px 60px #00000060}
.stat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:14px 18px;flex:1;min-width:90px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;margin-bottom:2px}
.stat-label{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:.6px}
.chip{font-size:10px;padding:3px 8px;border-radius:3px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:500;transition:all .1s;border:1px solid transparent;letter-spacing:.3px}
.chip.on{background:#0078d4;color:#fff}
.chip.off{background:#1a1a1a;color:#777;border-color:#2a2a2a}
.chip.off:hover{background:#222;color:#e0e0e0}
.status-item{font-size:11px;color:#ffffffcc;display:flex;align-items:center;gap:4px;padding:0 5px;font-family:'JetBrains Mono',monospace}
.modal-overlay{position:fixed;inset:0;background:#00000090;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-box{background:#1a1a1a;border:1px solid #3a3a3a;border-radius:8px;padding:24px;width:100%;max-width:400px;animation:fadeIn .15s ease;box-shadow:0 20px 60px #00000080}
.section-title{font-size:15px;font-weight:700;color:#e0e0e0;margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid #2a2a2a}
.guide-step{display:flex;gap:14px;margin-bottom:22px}
.step-num{width:22px;height:22px;border-radius:50%;background:#0078d4;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
.hidden{display:none!important}
.grid-files{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.admin-list{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;overflow:hidden}
.admin-row{display:grid;grid-template-columns:28px 1fr 80px 100px auto;gap:10px;padding:7px 14px;align-items:center;transition:background .1s;border-bottom:1px solid #2a2a2a}
.admin-row:last-child{border-bottom:none}
.admin-row:hover{background:#222}
.admin-header{display:grid;grid-template-columns:28px 1fr 80px 100px auto;gap:10px;padding:8px 14px;border-bottom:1px solid #2a2a2a;font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════
// FIX MOBILE VIEWPORT HEIGHT (address bar jump fix)
// ═══════════════════════════════════════════
function setVH(){
  document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
}
setVH();
window.addEventListener('resize', setVH);

// ═══════════════════════════════════════════
// PREVENT PAGE SCROLL ON MOBILE
// ═══════════════════════════════════════════
document.addEventListener('touchmove', function(e){
  if(e.target.closest('.editor') || e.target.closest('.sidebar')) return;
  e.preventDefault();
}, {passive:false});

// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const ADMIN_PASSWORD = "console store 2006";
const TYPE_COLORS = {video:"#b06ad4",pdf:"#e05252",note:"#3dc9a0",image:"#4a9cd6",audio:"#d4c87a",other:"#666666"};
const TYPE_ICONS  = {video:"▶",pdf:"⬡",note:"✦",image:"◈",audio:"♪",other:"◉"};

// ═══════════════════════════════════════════
// INDEXEDDB
// ═══════════════════════════════════════════
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("DataStoreDB",1);
    r.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains("files"))
        db.createObjectStore("files",{keyPath:"id"});
    };
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e.target.error);
  });
}
async function dbGetAll(){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const r=db.transaction("files","readonly").objectStore("files").getAll();
    r.onsuccess=e=>res(e.target.result||[]);
    r.onerror=e=>rej(e.target.error);
  });
}
async function dbSaveAll(items){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction("files","readwrite");
    const st=tx.objectStore("files");
    st.clear();
    items.forEach(i=>st.put(i));
    tx.oncomplete=res;
    tx.onerror=e=>rej(e.target.error);
  });
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function fmtSize(b){
  if(!b)return"0 B";
  if(b<1024)return b+" B";
  if(b<1048576)return(b/1024).toFixed(1)+" KB";
  return(b/1048576).toFixed(1)+" MB";
}
function fmtDate(iso){
  return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
function getFileType(f){
  const m=f.type||"";
  if(m.startsWith("video/"))return"video";
  if(m==="application/pdf")return"pdf";
  if(m.startsWith("image/"))return"image";
  if(m.startsWith("audio/"))return"audio";
  if(m.startsWith("text/"))return"note";
  return"other";
}
function getExt(name){
  const p=name.split(".");
  return p.length>1?"."+p[p.length-1].toLowerCase():"";
}
function uid(){return"f_"+Date.now()+"_"+Math.random().toString(36).slice(2)}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let S={
  items:[],
  loading:true,
  activeTab:"store",
  openTabs:["store","guide"],
  adminUnlocked:false,
  pwInput:"",
  pwError:false,
  uploading:false,
  uploadPct:0,
  uploadName:"",
  uploadDone:0,
  uploadTotal:0,
  filter:"all",
  search:"",
  selectedFile:null,
  editItem:null,
  notif:null,
  drag:false,
  sidebarOpen:true,
  explorerOpen:true,
  clock:"",
};

function setState(patch){
  Object.assign(S,patch);
  render();
}

// ═══════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════
let notifTimer=null;
function notify(msg,type="ok"){
  if(notifTimer)clearTimeout(notifTimer);
  const icons={ok:"✓",err:"✕",warn:"!"};
  setState({notif:{msg,type,icon:icons[type]||"✓"}});
  notifTimer=setTimeout(()=>setState({notif:null}),3500);
}

// ═══════════════════════════════════════════
// PERSIST
// ═══════════════════════════════════════════
async function persist(items){
  setState({items});
  await dbSaveAll(items);
}

// ═══════════════════════════════════════════
// UPLOAD
// ═══════════════════════════════════════════
async function handleUpload(files){
  if(!files||!files.length)return;
  setState({uploading:true,uploadDone:0,uploadTotal:files.length});
  let cur=[...S.items];
  for(let i=0;i<files.length;i++){
    const f=files[i];
    setState({uploadName:f.name,uploadPct:Math.round((i/files.length)*80),uploadDone:i});
    await new Promise(res=>{
      const r=new FileReader();
      r.onload=ev=>{
        cur=[...cur,{
          id:uid(),name:f.name,description:"",type:getFileType(f),
          size:f.size,mimeType:f.type,uploadedAt:new Date().toISOString(),
          dataUrl:ev.target.result,downloads:0
        }];
        setState({uploadPct:Math.round(((i+1)/files.length)*100)});
        res();
      };
      r.readAsDataURL(f);
    });
  }
  await persist(cur);
  setState({uploading:false,uploadPct:0,uploadDone:0,uploadTotal:0,uploadName:""});
  const fi=document.getElementById("file-input");
  if(fi)fi.value="";
  notify(files.length+" file"+(files.length>1?"s":"")+" uploaded");
}

function deleteItem(id){
  if(!confirm("Delete this file?"))return;
  const next=S.items.filter(i=>i.id!==id);
  if(S.selectedFile===id)setState({selectedFile:null});
  persist(next);
  notify("File deleted","warn");
}

function download(item){
  const a=document.createElement("a");
  a.href=item.dataUrl;a.download=item.name;a.click();
  const next=S.items.map(i=>i.id===item.id?{...i,downloads:(i.downloads||0)+1}:i);
  persist(next);
  notify('Downloading "'+item.name+'"');
}

function saveEdit(){
  const next=S.items.map(i=>i.id===S.editItem.id?S.editItem:i);
  persist(next);
  setState({editItem:null});
  notify("Changes saved");
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function openTab(id){
  const tabs=S.openTabs.includes(id)?S.openTabs:[...S.openTabs,id];
  setState({openTabs:tabs,activeTab:id});
}
function closeTab(id){
  const next=S.openTabs.filter(t=>t!==id);
  const active=S.activeTab===id?(next[next.length-1]||"store"):S.activeTab;
  setState({openTabs:next,activeTab:active});
}

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
setInterval(()=>setState({clock:new Date().toTimeString().slice(0,8)}),1000);

// ═══════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="html")el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
  const root=document.getElementById("app");
  const old=document.getElementById("ds-root");
  const node=buildApp();
  if(old)root.replaceChild(node,old);
  else root.appendChild(node);
  // re-attach dynamic listeners
  attachListeners();
}

function buildApp(){
  const {items,loading,activeTab,openTabs,adminUnlocked,filter,search,selectedFile,notif,drag,sidebarOpen,explorerOpen,uploading,uploadPct,uploadName,uploadDone,uploadTotal,editItem,clock,pwInput,pwError}=S;

  const filtered=items.filter(it=>{
    const tOk=filter==="all"||it.type===filter;
    const sOk=it.name.toLowerCase().includes(search.toLowerCase())||(it.description||"").toLowerCase().includes(search.toLowerCase());
    return tOk&&sOk;
  });
  const counts=items.reduce((a,i)=>{a[i.type]=(a[i.type]||0)+1;return a;},{});
  const TAB_LABELS={store:"store.json",admin:"admin.ts",guide:"README.md"};
  const TAB_ICONS={store:"◉",admin:"⚙",guide:"✦"};
  const TAB_COLORS={store:"#4a9cd6",admin:"#b06ad4",guide:"#3dc9a0"};

  // ── NOTIF ──
  const notifEl=notif?h("div",{class:`notif ${notif.type}`},
    h("span",{style:{fontSize:"14px",flexShrink:"0"}},notif.icon),
    notif.msg
  ):null;

  // ── EDIT MODAL ──
  const modalEl=editItem?h("div",{class:"modal-overlay",onClick:()=>setState({editItem:null})},
    h("div",{class:"modal-box",onClick:e=>e.stopPropagation()},
      h("div",{style:{fontSize:"14px",fontWeight:"700",marginBottom:"4px",color:"#e0e0e0"}},"Edit File"),
      h("div",{style:{fontSize:"11px",color:"#777",marginBottom:"20px",fontFamily:"JetBrains Mono,monospace"}},editItem.name),
      h("label",{style:{display:"block",marginBottom:"12px"}},
        h("div",{style:{fontSize:"10px",color:"#777",marginBottom:"5px",textTransform:"uppercase",letterSpacing:".6px"}},"Display Name"),
        h("input",{class:"vsc-input",id:"edit-name",value:editItem.name})
      ),
      h("label",{style:{display:"block",marginBottom:"20px"}},
        h("div",{style:{fontSize:"10px",color:"#777",marginBottom:"5px",textTransform:"uppercase",letterSpacing:".6px"}},"Description"),
        h("textarea",{class:"vsc-input",id:"edit-desc",rows:"3",placeholder:"What's in this file…",style:{resize:"vertical"}},editItem.description||"")
      ),
      h("div",{style:{display:"flex",gap:"8px",justifyContent:"flex-end"}},
        h("button",{class:"btn-secondary",onClick:()=>setState({editItem:null})},"Cancel"),
        h("button",{class:"btn-primary",id:"save-edit-btn"},"Save")
      )
    )
  ):null;

  // ── TITLEBAR ──
  const titlebar=h("div",{class:"titlebar"},
    h("div",{style:{fontSize:"11px",color:"#444",fontFamily:"JetBrains Mono,monospace",letterSpacing:".5px"}},"DATASTORE"),
    h("div",{style:{flex:"1",textAlign:"center",fontSize:"11px",color:"#444",letterSpacing:".3px"}},"visual file manager"),
    h("div",{style:{fontSize:"11px",color:"#444",fontFamily:"JetBrains Mono,monospace"}},"v3")
  );

  // ── ACTIVITY BAR ──
  const activityBar=h("div",{class:"activity"},
    h("div",{class:"act-icon"+(sidebarOpen?" active":""),title:"Explorer",onClick:()=>setState({sidebarOpen:!sidebarOpen}),style:{fontSize:"18px"}},"⬚"),
    h("div",{style:{height:"1px",width:"24px",background:"#2a2a2a",margin:"4px auto"}}),
    ...[{id:"store",icon:"◉"},{id:"admin",icon:"⚙"},{id:"guide",icon:"✦"}].map(({id,icon})=>

  // ── STORE TAB ──
  function buildStore(){
    const detailEl=selectedItem?h("div",{class:"file-detail"},

                  h("div",{style:{fontSize:"12px",fontFamily:"JetBrains Mono,monospace",color:m.c||"#e0e0e0"}},m.v)

        ...filtered.map((item,idx)=>
          h("div",{class:"file-card",style:{animationDelay:idx*0.03+"s"},onClick:()=>setState({selectedFile:item.id})},

            h("div",{class:"file-card-body"},

  // ── ADMIN TAB ──
  function buildAdmin(){
    if(!adminUnlocked){
      return h("div",{class:"editor"},
        h("div",{class:"pw-screen"},
          h("div",{style:{textAlign:"center",marginBottom:"24px"}},
            h("div",{style:{fontSize:"28px",marginBottom:"10px",fontFamily:"JetBrains Mono,monospace",color:"#0078d4"}},"⚙"),
            h("div",{style:{fontSize:"14px",fontWeight:"700",marginBottom:"4px"}},"Admin Access"),
            h("div",{style:{color:"#777",fontSize:"11px"}},"Enter password to continue")

          h("input",{class:"vsc-input",id:"pw-input",type:"password",placeholder:"Password…",value:pwInput,
            style:{marginBottom:"8px",borderColor:pwError?"#e05252":"",boxShadow:pwError?"0 0 0 2px #e0525230":""},
            onInput:e=>setState({pwInput:e.target.value,pwError:false})

    }

      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"22px"}},

        ),
        h("button",{class:"btn-secondary",style:{fontSize:"11px"},onClick:()=>setState({adminUnlocked:false,activeTab:"store"})},"⚙ Lock")
      ),

          h("div",{class:"stat-card"},
            h("div",{class:"stat-val",style:{color:s.c}},s.v),
            h("div",{class:"stat-label"},s.l)
          )
        )
      ),
      h("div",{class:"upload-zone"+(drag?" drag":""),style:{marginBottom:"22px"},id:"upload-zone"},
        h("input",{type:"file",multiple:"true",id:"file-input",style:{display:"none"}}),
        uploading?h("div",null,
          h("div",{style:{fontSize:"28px",marginBottom:"10px",animation:"pulse 1s infinite",fontFamily:"JetBrains Mono,monospace",color:"#0078d4"}},"↑"),
          h("div",{style:{color:"#0078d4",fontSize:"13px",fontWeight:"600",marginBottom:"6px",fontFamily:"JetBrains Mono,monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"260px"}},uploadName),
          h("div",{style:{fontSize:"11px",color:"#777",marginBottom:"10px"}},(uploadDone+1)+" of "+uploadTotal+" file"+(uploadTotal>1?"s":"")),
          h("div",{class:"prog-track",style:{maxWidth:"280px",margin:"0 auto"}},
            h("div",{class:"prog-fill",style:{width:uploadPct+"%"}})
          ),
          h("div",{style:{fontSize:"10px",color:"#777",marginTop:"6px",fontFamily:"JetBrains Mono,monospace"}},uploadPct+"%")
        ):h("div",null,
          h("div",{class:"upload-icon"},"↑"),
          h("div",{style:{fontWeight:"600",marginBottom:"6px",fontSize:"14px"}},"Drop files here"),
          h("div",{style:{color:"#777",fontSize:"12px",marginBottom:"16px"}},"or click to browse · any file type"),
          h("button",{class:"btn-primary",style:{fontSize:"12px"},onClick:e=>{e.stopPropagation();document.getElementById("file-input").click()}},"Select Files")
        )

        h("div",{style:{fontSize:"10px",color:"#777",marginBottom:"10px",fontFamily:"JetBrains Mono,monospace",textTransform:"uppercase",letterSpacing:".6px"}},items.length+" files in store"),
        h("div",{class:"admin-list"},
          h("div",{class:"admin-header"},
            h("span",null),h("span",null,"Name"),h("span",null,"Size"),h("span",null,"Date"),h("span",{style:{textAlign:"right"}},"Actions")
          ),
          ...items.map(item=>
            h("div",{class:"admin-row"},
              h("span",{style:{fontSize:"14px",color:TYPE_COLORS[item.type],fontFamily:"JetBrains Mono,monospace"}},TYPE_ICONS[item.type]),
              h("div",{style:{overflow:"hidden"}},
                h("div",{style:{fontSize:"12px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:"500"}},item.name),
                item.description?h("div",{style:{fontSize:"10px",color:"#777",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:"1px"}},item.description):null
              ),

  // ── GUIDE TAB ──
  function buildGuide(){
    return h("div",{class:"editor",style:{maxWidth:"660px"}},
      h("div",{style:{fontFamily:"JetBrains Mono,monospace",fontSize:"11px",color:"#4d9b5e",marginBottom:"14px"}},"# README.md"),
      h("div",{style:{fontSize:"20px",fontWeight:"700",marginBottom:"4px"}},"How to Use DataStore"),
      h("div",{style:{color:"#777",fontSize:"12px",marginBottom:"32px",lineHeight:"1.5"}},"Guide for visitors and the store owner."),
      h("div",null,
        h("div",{class:"section-title"},"For Visitors — Download Files"),

          {n:1,t:"Open Store tab",b:"Click the ◉ Store icon in the activity bar on the left."},

          h("div",{style:{display:"flex",gap:"12px",fontSize:"12px",color:"#666",marginBottom:"10px",lineHeight:"1.5"}},

            h("span",null,tip)

  }

  // ── STATUSBAR ──
  const statusbar=h("div",{class:"statusbar"},
    h("div",{class:"status-item"},"⎇ main"),
    h("div",{class:"status-item"},"◉ "+items.length+" files"),
    h("div",{class:"status-item",style:{marginLeft:"auto"}},clock),
    h("div",{class:"status-item"},"IndexedDB"),
    h("div",{class:"status-item"},"DataStore v3")
  );

  // ── ASSEMBLE ──
  const contentArea=activeTab==="store"?buildStore():activeTab==="admin"?buildAdmin():buildGuide();

  return h("div",{id:"ds-root",class:"root"},
    notifEl,
    modalEl,
    titlebar,
    h("div",{class:"main"},
      activityBar,
      sidebarEl,
      h("div",{class:"content"},
        tabbarEl,
        breadcrumbEl,

        statusbar
      )

}

// ═══════════════════════════════════════════
// EVENT DELEGATION
// ═══════════════════════════════════════════
function attachListeners(){
  // Search
  const si=document.getElementById("search-input");
  if(si)si.addEventListener("input",e=>setState({search:e.target.value}));

  // Password
  const pi=document.getElementById("pw-input");
  if(pi){
    pi.addEventListener("keydown",e=>{if(e.key==="Enter")tryPw();});
    pi.addEventListener("input",e=>Object.assign(S,{pwInput:e.target.value}));
  }
  const ub=document.getElementById("unlock-btn");
  if(ub)ub.addEventListener("click",tryPw);

  // Save edit
  const seb=document.getElementById("save-edit-btn");
  if(seb)seb.addEventListener("click",()=>{
    const name=document.getElementById("edit-name")?.value||S.editItem.name;
    const desc=document.getElementById("edit-desc")?.value||"";
    S.editItem={...S.editItem,name,description:desc};
    saveEdit();
  });
  const en=document.getElementById("edit-name");
  if(en)en.addEventListener("input",e=>Object.assign(S.editItem,{name:e.target.value}));
  const ed=document.getElementById("edit-desc");
  if(ed)ed.addEventListener("input",e=>Object.assign(S.editItem,{description:e.target.value}));

  // Upload zone
  const uz=document.getElementById("upload-zone");
  if(uz){
    uz.addEventListener("click",()=>{if(!S.uploading)document.getElementById("file-input")?.click();});
    uz.addEventListener("dragover",e=>{e.preventDefault();if(!S.drag)setState({drag:true});});
    uz.addEventListener("dragleave",e=>{if(!uz.contains(e.relatedTarget))setState({drag:false});});
    uz.addEventListener("drop",e=>{e.preventDefault();setState({drag:false});if(!S.uploading)handleUpload(Array.from(e.dataTransfer.files));});
  }
  const fi=document.getElementById("file-input");
  if(fi)fi.addEventListener("change",e=>handleUpload(Array.from(e.target.files)));
}

function tryPw(){
  if(S.pwInput===ADMIN_PASSWORD){
    setState({adminUnlocked:true,pwError:false,pwInput:""});
    notify("Admin access granted");
  } else {
    setState({pwError:true});
    setTimeout(()=>setState({pwError:false}),900);
  }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
(async()=>{
  render();
  try{
    const items=await dbGetAll();
    setState({items,loading:false});
  }catch(e){
    setState({loading:false});
    notify("Storage error: "+e.message,"err");
  }
})();
</script>
